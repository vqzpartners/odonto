<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Página no encontrada | OdontoEstética Panamá</title>
    
    <!-- Evitar que Google indexe la página de error -->
    <meta name="robots" content="noindex, follow">
    
    <!-- Favicon -->
    <link rel="icon" type="image/png" href="img/favicon.png">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: #000000;
            color: #ffffff;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 20px;
        }

        .logo {
            width: 100%;
            max-width: 250px;
            margin-bottom: 40px;
        }

        .logo img {
            width: 100%;
            height: auto;
        }

        .error-code {
            font-size: 8rem;
            font-weight: 900;
            color: #ffc107;
            line-height: 1;
            margin-bottom: 10px;
            text-shadow: 0 0 30px rgba(255, 193, 7, 0.2);
        }

        .error-title {
            font-size: 2rem;
            font-weight: 700;
            margin-bottom: 15px;
        }

        .error-message {
            font-size: 1.1rem;
            color: #aaaaaa;
            max-width: 400px;
            margin-bottom: 40px;
            line-height: 1.5;
        }

        .back-btn {
            display: inline-block;
            background: #ffc107;
            color: #000000;
            text-decoration: none;
            padding: 14px 35px;
            border-radius: 50px;
            font-weight: 700;
            font-size: 1rem;
            transition: all 0.3s ease;
            border: 1px solid #ffc107;
        }

        .back-btn:hover {
            background: transparent;
            color: #ffc107;
            transform: translateY(-5px);
            box-shadow: 0 10px 25px rgba(255, 193, 7, 0.15);
        }

        /* Responsive */
        @media (max-width: 480px) {
            .error-code { font-size: 6rem; }
            .error-title { font-size: 1.5rem; }
            .logo { max-width: 200px; }
        }
    </style>
</head>
<body>

    <!-- Logo -->
    <a href="index.html" class="logo">
        <img src="img/logo-white-firma.svg" alt="OdontoEstética Panamá">
    </a>

    <!-- Mensaje de Error -->
    <div class="error-code">404</div>
    <h1 class="error-title">Página no encontrada</h1>
    <p class="error-message">Lo sentimos, la página que estás buscando no existe, fue movida o ocurrió un error.</p>

    <!-- Botón de regreso -->
    <a href="index.html" class="back-btn">Volver al Inicio</a>

    <script data-collect-dnt="true" async src="https://scripts.simpleanalyticscdn.com/latest.js"></script>
</body>
</html>
